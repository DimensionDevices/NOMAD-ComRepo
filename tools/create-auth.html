<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOMAD auth builder</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
        }
        body {
            background: #fdfaf1;
            background: linear-gradient(145deg, #fdfaf1 0%, #f5f0e1 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            margin: 0;
        }
        .card {
            max-width: 820px;
            width: 100%;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(84, 117, 64, 0.15);
            border-radius: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 32px 36px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #2c3e2d;
            margin-bottom: 6px;
        }
        .sub {
            color: #5c6e5d;
            font-size: 0.95rem;
            margin-top: -4px;
            margin-bottom: 28px;
            line-height: 1.5em;
            padding-top: 0.5em;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px 32px;
        }
        .panel {
            background: rgba(255, 255, 255, 0.65);
            border-radius: 20px;
            padding: 20px 22px 24px;
            border: 1px solid rgba(84, 117, 64, 0.15);
        }
        .panel h3 {
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 18px;
            color: #2c3e2d;
            border-bottom: 1px dashed rgba(84, 117, 64, 0.15);
            padding-bottom: 10px;
        }
        .field {
            margin-bottom: 16px;
        }
        .field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #5c6e5d;
            margin-bottom: 4px;
            letter-spacing: 0.02em;
        }
        .field input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(84, 117, 64, 0.15);
            border-radius: 14px;
            background: #fdfaf1;
            color: #2c3e2d;
            font-size: 0.95rem;
            transition: 0.15s;
        }
        .field input:focus {
            outline: 2px solid #547540;
            border-color: transparent;
        }
        .btn {
            background: #547540;
            border: none;
            color: #fff;
            font-weight: 500;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
            margin-top: 4px;
        }
        .btn:hover { background: #456334; }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(84, 117, 64, 0.15);
            color: #2c3e2d;
        }
        .btn-outline:hover { background: rgba(84, 117, 64, 0.05); }
        .btn-danger {
            background: #b0413e;
        }
        .btn-danger:hover { background: #8f3532; }
        .user-list {
            margin-top: 18px;
            background: rgba(255, 255, 255, 0.65);
            border-radius: 16px;
            padding: 8px 0;
            border: 1px solid rgba(84, 117, 64, 0.15);
            max-height: 300px;
            overflow-y: auto;
        }
        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid rgba(84, 117, 64, 0.08);
        }
        .user-row:last-child { border-bottom: none; }
        .user-name {
            font-weight: 500;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.9rem;
            color: #2c3e2d;
        }
        .user-hash {
            font-size: 0.7rem;
            color: #5c6e5d;
            max-width: 130px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            background: rgba(84, 117, 64, 0.05);
            padding: 2px 10px;
            border-radius: 40px;
        }
        .user-actions button {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 1rem;
            padding: 0 4px;
            transition: 0.1s;
        }
        .user-actions button:hover { color: #b0413e; }
        .empty-users {
            color: #5c6e5d;
            text-align: center;
            padding: 14px 0;
            font-size: 0.9rem;
        }
        .gen-area {
            margin-top: 28px;
            border-top: 2px solid rgba(84, 117, 64, 0.15);
            padding-top: 24px;
        }
        .gen-area textarea {
            width: 100%;
            height: 250px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            background: #1b3012;
            color: #e2e8f0;
            border: 1px solid rgba(84, 117, 64, 0.3);
            border-radius: 16px;
            padding: 16px;
            resize: vertical;
            line-height: 1.5;
            tab-size: 2;
        }
        .gen-area textarea:focus {
            outline: 2px solid #547540;
            border-color: transparent;
        }
        .gen-actions {
            display: flex;
            gap: 12px;
            margin: 12px 0 6px;
            flex-wrap: wrap;
        }
        .gen-actions .btn {
            width: auto;
            padding: 8px 22px;
        }
        .badge {
            background: rgba(84, 117, 64, 0.1);
            color: #547540;
            font-size: 0.7rem;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 500;
        }
        .footnote {
            margin-top: 16px;
            font-size: 0.8rem;
            color: #5c6e5d;
            background: rgba(84, 117, 64, 0.05);
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-block;
        }
        .status-msg {
            margin-top: 8px;
            font-size: 0.9rem;
            min-height: 1.4em;
            color: #5c6e5d;
        }
        @media (max-width: 680px) {
            .grid-2 { grid-template-columns: 1fr; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>NOMAD auth builder</h1>
    <div class="sub">Hash passwords, manage users and generate auth.ext for NOMAD devices. This is <u>not</u> a secure authentication extension, but a deterrant for wannabie script kiddies.</div>

    <div class="grid-2">
        <div class="panel">
            <h3>Add user</h3>
            <div class="field">
                <label>Username</label>
                <input type="text" id="newUsername" placeholder="e.g. alice" autocomplete="off">
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="newPassword" placeholder="••••••••">
            </div>
            <div class="field">
                <label>Confirm</label>
                <input type="password" id="newPassword2" placeholder="••••••••">
            </div>
            <button class="btn" id="addUserBtn">Create user</button>
            <div id="addFeedback" class="status-msg"></div>
        </div>

        <div class="panel">
            <h3>Users <span class="badge" id="userCount">0</span></h3>
            <div id="userListContainer">
                <div class="user-list" id="userList">
                    <div class="empty-users">no users yet</div>
                </div>
            </div>
            <button class="btn btn-danger" id="clearAllBtn" style="margin-top: 14px;">Remove all users</button>
        </div>
    </div>

    <div class="gen-area">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 6px;">
            <span style="font-weight: 600; font-size: 1rem; color: #2c3e2d;">Generated .ext</span>
            <span style="font-size: 0.75rem; background: rgba(84, 117, 64, 0.1); color: #547540; padding: 2px 12px; border-radius: 40px;">users embedded</span>
        </div>
        <textarea id="outputScript" readonly></textarea>
        <div class="gen-actions">
            <button class="btn" id="generateBtn">Generate .ext</button>
            <button class="btn btn-outline" id="copyBtn">Copy</button>
            <button class="btn btn-outline" id="downloadBtn">Download .ext</button>
        </div>
        <div id="genFeedback" class="status-msg"></div>
    </div>
</div>

<script>
(function(){
    let users = {};

    const newUser = document.getElementById('newUsername');
    const newPass = document.getElementById('newPassword');
    const newPass2 = document.getElementById('newPassword2');
    const addFeedback = document.getElementById('addFeedback');
    const userListEl = document.getElementById('userList');
    const userCount = document.getElementById('userCount');
    const outputScript = document.getElementById('outputScript');
    const genFeedback = document.getElementById('genFeedback');

    // SHA-256 implementation (same as original)
    function sha256Sync(ascii) {
        function rrot(v, n) { return (v >>> n) | (v << (32 - n)); }
        const maxWord = Math.pow(2, 32);
        let result = '';
        let words = [];
        const asciiBitLength = ascii.length * 8;
        let hash = sha256Sync.h = sha256Sync.h || [];
        let k = sha256Sync.k = sha256Sync.k || [];
        let primeCounter = k.length;
        let isComposite = {};
        for (let candidate = 2; primeCounter < 64; candidate++) {
            if (!isComposite[candidate]) {
                for (let i = 0; i < 313; i += candidate) isComposite[i] = candidate;
                hash[primeCounter] = (Math.pow(candidate, 0.5) * maxWord) | 0;
                k[primeCounter++] = (Math.pow(candidate, 1/3) * maxWord) | 0;
            }
        }
        ascii += String.fromCharCode(128);
        while (ascii.length % 64 - 56) ascii += String.fromCharCode(0);
        for (let i = 0; i < ascii.length; i++) {
            let j = ascii.charCodeAt(i);
            if (j >> 8) return;
            words[i >> 2] |= j << ((3 - i) % 4) * 8;
        }
        words[words.length] = (asciiBitLength / maxWord) | 0;
        words[words.length] = asciiBitLength;
        for (let j = 0; j < words.length; ) {
            const w = words.slice(j, j += 16);
            const oldHash = hash;
            hash = hash.slice(0, 8);
            for (let i = 0; i < 64; i++) {
                const w15 = w[i - 15], w2 = w[i - 2];
                const a = hash[0], e = hash[4];
                const temp1 = hash[7] + (rrot(e,6) ^ rrot(e,11) ^ rrot(e,25)) + ((e & hash[5]) ^ ((~e) & hash[6])) + k[i] + (w[i] = (i < 16) ? w[i] : (w[i-16] + (rrot(w15,7) ^ rrot(w15,18) ^ (w15 >>> 3)) + w[i-7] + (rrot(w2,17) ^ rrot(w2,19) ^ (w2 >>> 10))) | 0);
                const temp2 = (rrot(a,2) ^ rrot(a,13) ^ rrot(a,22)) + ((a & hash[1]) ^ (a & hash[2]) ^ (hash[1] & hash[2]));
                hash = [(temp1 + temp2) | 0].concat(hash);
                hash[4] = (hash[4] + temp1) | 0;
            }
            for (let i = 0; i < 8; i++) hash[i] = (hash[i] + oldHash[i]) | 0;
        }
        for (let i = 0; i < 8; i++) {
            for (let j = 3; j + 1; j--) {
                let b = (hash[i] >> (j * 8)) & 255;
                result += ((b < 16) ? '0' : '') + b.toString(16);
            }
        }
        return result;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function renderUsers() {
        const keys = Object.keys(users);
        userCount.textContent = keys.length;
        if (keys.length === 0) {
            userListEl.innerHTML = `<div class="empty-users">no users yet</div>`;
            return;
        }
        let html = '';
        keys.forEach(username => {
            const hash = users[username];
            html += `<div class="user-row">
                <span class="user-name">${escapeHtml(username)}</span>
                <span class="user-hash">${hash.slice(0,12)}...</span>
                <span class="user-actions">
                    <button data-username="${escapeHtml(username)}" class="removeUserBtn" title="remove user">✕</button>
                </span>
            </div>`;
        });
        userListEl.innerHTML = html;
        document.querySelectorAll('.removeUserBtn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const name = this.getAttribute('data-username');
                if (name && users[name]) {
                    delete users[name];
                    renderUsers();
                    updateScript();
                    addFeedback.textContent = `removed "${name}"`;
                    addFeedback.style.color = '#5c6e5d';
                }
            });
        });
    }

    document.getElementById('addUserBtn').addEventListener('click', function() {
        const username = newUser.value.trim();
        const p1 = newPass.value;
        const p2 = newPass2.value;
        addFeedback.style.color = '#5c6e5d';

        if (!username) { addFeedback.textContent = 'Username required.'; return; }
        if (p1.length < 4) { addFeedback.textContent = 'Password must be at least 4 characters.'; return; }
        if (p1 !== p2) { addFeedback.textContent = 'Passwords do not match.'; return; }
        if (users[username]) { addFeedback.textContent = `User "${username}" already exists.`; return; }

        const hash = sha256Sync(p1);
        users[username] = hash;
        renderUsers();
        updateScript();
        addFeedback.textContent = `User "${username}" created.`;
        newUser.value = ''; newPass.value = ''; newPass2.value = '';
        newUser.focus();
    });

    document.getElementById('clearAllBtn').addEventListener('click', function() {
        if (Object.keys(users).length === 0) {
            addFeedback.textContent = 'No users to remove.';
            return;
        }
        if (confirm('Remove all users?')) {
            users = {};
            renderUsers();
            updateScript();
            addFeedback.textContent = 'All users removed.';
        }
    });

    function buildUserObject() {
        const keys = Object.keys(users);
        if (keys.length === 0) return '{}';
        const parts = keys.map(u => `"${u}":"${users[u]}"`);
        return '{' + parts.join(',') + '}';
    }

    function generateFullScript() {
        const userObjStr = buildUserObject();
        
        // JavaScript code with forceful hiding of details.section
        const jsCode = `(function(){var NMDAUTH_DB_FILE='auth.ext';var NMDAUTH_SESSION_KEY='nmdauth_session_user';var nmdauthLockTimer=null;var nmdauthHideTimer=null;function nmdauthSha256Sync(ascii){function rrot(v,n){return(v>>>n)|(v<<(32-n));}var mathPow=Math.pow;var maxWord=mathPow(2,32);var lengthProperty='length';var i,j;var result='';var words=[];var asciiBitLength=ascii[lengthProperty]*8;var hash=nmdauthSha256Sync.h=nmdauthSha256Sync.h||[];var k=nmdauthSha256Sync.k=nmdauthSha256Sync.k||[];var primeCounter=k[lengthProperty];var isComposite={};for(var candidate=2;primeCounter<64;candidate++){if(!isComposite[candidate]){for(i=0;i<313;i+=candidate){isComposite[i]=candidate;}hash[primeCounter]=(mathPow(candidate,0.5)*maxWord)|0;k[primeCounter++]=(mathPow(candidate,1/3)*maxWord)|0;}}ascii+=String.fromCharCode(128);while(ascii[lengthProperty]%64-56){ascii+=String.fromCharCode(0);}for(i=0;i<ascii[lengthProperty];i++){j=ascii.charCodeAt(i);if(j>>8){return;}words[i>>2]|=j<<((3-i)%4)*8;}words[words[lengthProperty]]=(asciiBitLength/maxWord)|0;words[words[lengthProperty]]=asciiBitLength;for(j=0;j<words[lengthProperty];){var w=words.slice(j,j+=16);var oldHash=hash;hash=hash.slice(0,8);for(i=0;i<64;i++){var w15=w[i-15],w2=w[i-2];var a=hash[0],e=hash[4];var temp1=hash[7]+(rrot(e,6)^rrot(e,11)^rrot(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]+(w[i]=(i<16)?w[i]:(w[i-16]+(rrot(w15,7)^rrot(w15,18)^(w15>>>3))+w[i-7]+(rrot(w2,17)^rrot(w2,19)^(w2>>>10)))|0);var temp2=(rrot(a,2)^rrot(a,13)^rrot(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));hash=[(temp1+temp2)|0].concat(hash);hash[4]=(hash[4]+temp1)|0;}for(i=0;i<8;i++){hash[i]=(hash[i]+oldHash[i])|0;}}for(i=0;i<8;i++){for(j=3;j+1;j--){var b=(hash[i]>>(j*8))&255;result+=((b<16)?'0':'')+b.toString(16);}}return result;}function nmdauthSha256(text){return Promise.resolve(nmdauthSha256Sync(String(text)));}function nmdauthDbGet(key){var url='/api/db/get?filename='+encodeURIComponent(NMDAUTH_DB_FILE);if(key){url+='&key='+encodeURIComponent(key);}return fetch(url).then(function(r){return r.json();}).then(function(j){return (j&&j.success)?j.data:null;}).catch(function(){return null;});}function nmdauthDbSet(dataObj){return fetch('/api/db/set',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename:NMDAUTH_DB_FILE,data:dataObj})}).then(function(r){return r.json();}).catch(function(){return {success:false};});}function nmdauthGetUsers(){return nmdauthDbGet('users').then(function(users){return users||{};});}function nmdauthLockdown(reason){if(nmdauthLockTimer){return;}var msg=reason||'Unauthorized';function paint(){document.body.innerHTML='';var div=document.createElement('div');div.className='nmdauth-locked';div.innerHTML='UNAUTHORIZED<br><span style=\\'font-size:0.6em;opacity:0.8;\\'>'+msg+'</span>';document.body.appendChild(div);}paint();nmdauthLockTimer=setInterval(paint,300);}function nmdauthRenderLogin(container,errorMsg){container.innerHTML='';var overlay=document.createElement('div');overlay.className='nmdauth-overlay';overlay.innerHTML="<div class='nmdauth-card'><h2>NOMAD Login</h2><p class='nmdauth-sub'>Sign in to continue.</p><div class='nmdauth-field'><label>Username</label><input id='nmdauth_login_user' autocomplete='username'></div><div class='nmdauth-field'><label>Password</label><input id='nmdauth_login_pass' type='password' autocomplete='current-password'></div><button class='nmdauth-btn' id='nmdauth_login_btn'>Log In</button><div class='nmdauth-error' id='nmdauth_login_err'></div></div>";container.appendChild(overlay);if(errorMsg){document.getElementById('nmdauth_login_err').textContent=errorMsg;}document.getElementById('nmdauth_login_btn').addEventListener('click',function(){nmdauthAttemptLogin(container);});document.getElementById('nmdauth_login_pass').addEventListener('keydown',function(e){if(e.key==='Enter'){nmdauthAttemptLogin(container);}});}function nmdauthAttemptLogin(container){var uEl=document.getElementById('nmdauth_login_user');var pEl=document.getElementById('nmdauth_login_pass');var errEl=document.getElementById('nmdauth_login_err');var username=(uEl.value||'').trim();var password=pEl.value||'';if(!username||!password){errEl.textContent='Enter a username and password.';return;}errEl.textContent='Checking...';nmdauthGetUsers().then(function(users){var stored=users[username];if(!stored){errEl.textContent='';nmdauthLockdown('Unknown user "'+username+'"');return;}nmdauthSha256(password).then(function(hash){if(hash===stored){sessionStorage.setItem(NMDAUTH_SESSION_KEY,username);nmdauthRenderDashboard(container,username);}else{errEl.textContent='';nmdauthLockdown('Invalid credentials for "'+username+'"');}});});}function nmdauthRenderDashboard(container,username){container.innerHTML='';var topbar=document.createElement('div');topbar.className='nmdauth-topbar';topbar.innerHTML="<span>Logged in as <strong>"+username+"</strong></span><span><button id='nmdauth_logout'>Log Out</button></span>";document.body.insertBefore(topbar,document.body.firstChild);document.body.style.paddingTop='42px';document.getElementById('nmdauth_logout').addEventListener('click',function(){sessionStorage.removeItem(NMDAUTH_SESSION_KEY);window.location.reload();});if(nmdauthHideTimer){clearInterval(nmdauthHideTimer);nmdauthHideTimer=null;}nmdauthShowSections();}function nmdauthHideSections(){var sections=document.querySelectorAll('details.section');for(var i=0;i<sections.length;i++){sections[i].style.display='none';}}function nmdauthShowSections(){var sections=document.querySelectorAll('details.section');for(var i=0;i<sections.length;i++){sections[i].style.display='';}}function nmdauthEnforceHide(){nmdauthHideSections();if(!sessionStorage.getItem(NMDAUTH_SESSION_KEY)){nmdauthHideSections();}}function nmdauthInit(){var root=document.getElementById('nmdauth_root');if(!root){return;}var overlayHost=document.createElement('div');overlayHost.id='nmdauth_overlay_host';document.body.appendChild(overlayHost);nmdauthHideSections();if(nmdauthHideTimer){clearInterval(nmdauthHideTimer);}nmdauthHideTimer=setInterval(nmdauthEnforceHide,500);var users = ${userObjStr}; if (Object.keys(users).length > 0) { nmdauthDbSet({users:users}).then(function(){ var existingSession=sessionStorage.getItem(NMDAUTH_SESSION_KEY); if(existingSession){ nmdauthGetUsers().then(function(u){ if(u[existingSession]){ nmdauthRenderDashboard(overlayHost,existingSession); } else { sessionStorage.removeItem(NMDAUTH_SESSION_KEY); nmdauthRenderLogin(overlayHost); } }); } else { nmdauthRenderLogin(overlayHost); } }); } else { nmdauthRenderLogin(overlayHost); } } function nmdauthEarlyInit(){if(document.readyState==='loading'){document.addEventListener('readystatechange',function handler(){if(document.readyState!=='loading'){document.removeEventListener('readystatechange',handler);nmdauthInit();}});}else{nmdauthInit();}}nmdauthEarlyInit();})();`;

        // CSS with the requested color scheme
        const css = ":root {--bg: #fdfaf1; --bg-gradient: linear-gradient(145deg, #fdfaf1 0%, #f5f0e1 100%); --surface: rgba(255, 255, 255, 0.65); --border: rgba(84, 117, 64, 0.15); --text: #2c3e2d; --text-dim: #5c6e5d; --accent: #547540; --accent-hover: #456334; --card-bg: rgba(84, 117, 64, 0.05); --stat-val: #1b3012; --danger: #b0413e; --shadow: 0 4px 20px rgba(0,0,0,0.08);}.nmdauth-overlay{position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;}.nmdauth-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;width:100%;max-width:340px;box-sizing:border-box;}.nmdauth-card h2{margin:0 0 6px;color:var(--text);font-size:1.3em;}.nmdauth-card p.nmdauth-sub{margin:0 0 18px;color:var(--text-dim);font-size:0.85em;}.nmdauth-field{margin-bottom:12px;}.nmdauth-field label{display:block;font-size:0.8em;color:var(--text-dim);margin-bottom:4px;}.nmdauth-field input{width:100%;box-sizing:border-box;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1em;}.nmdauth-btn{width:100%;padding:11px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:1em;cursor:pointer;margin-top:6px;}.nmdauth-btn:hover{background:var(--accent-hover);}.nmdauth-btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text);}.nmdauth-error{color:var(--danger);font-size:0.85em;min-height:1.2em;margin-top:8px;}.nmdauth-locked{position:fixed;inset:0;background:#1a0000;color:#ff5c5c;z-index:2147483647;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:1.4em;text-align:center;padding:20px;box-sizing:border-box;}.nmdauth-topbar{position:fixed;top:0;left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;justify-content:space-between;align-items:center;z-index:9998;font-size:0.85em;color:var(--text);}.nmdauth-topbar button{background:none;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:0.85em;}";

        const jsonObj = {
            description: "Best-effort multi-user login gate. Hides the dashboard behind a login screen backed by localStorage-style device storage (/api/db). NOTE: this is a UI convenience layer, not real security — anyone with API access or the ability to read this .ext file can bypass it.",
            target: "footer",
            css: css,
            html: "<div id='nmdauth_root'></div>",
            js: jsCode
        };

        return JSON.stringify(jsonObj, null, 2);
    }

    function updateScript() {
        if (Object.keys(users).length === 0) {
            outputScript.value = 'No users added. Add at least one user to generate the script.';
            genFeedback.textContent = 'Add a user first';
            genFeedback.style.color = '#f59e0b';
            return;
        }
        try {
            const script = generateFullScript();
            outputScript.value = script;
            genFeedback.textContent = `Script generated with ${Object.keys(users).length} user(s).`;
            genFeedback.style.color = '#547540';
        } catch(e) {
            outputScript.value = 'Error generating script: ' + e.message;
            genFeedback.textContent = 'Error: ' + e.message;
            genFeedback.style.color = '#b0413e';
        }
    }

    document.getElementById('generateBtn').addEventListener('click', updateScript);

    document.getElementById('copyBtn').addEventListener('click', function() {
        const val = outputScript.value;
        if (!val || val.startsWith('No users')) {
            genFeedback.textContent = 'Nothing to copy. Generate script first.';
            genFeedback.style.color = '#f59e0b';
            return;
        }
        navigator.clipboard.writeText(val).then(() => {
            genFeedback.textContent = 'Copied to clipboard!';
            genFeedback.style.color = '#547540';
        }).catch(() => {
            outputScript.select();
            document.execCommand('copy');
            genFeedback.textContent = 'Copied (fallback).';
            genFeedback.style.color = '#547540';
        });
    });

    document.getElementById('downloadBtn').addEventListener('click', function() {
        const val = outputScript.value;
        if (!val || val.startsWith('No users')) {
            genFeedback.textContent = 'Generate script first.';
            genFeedback.style.color = '#f59e0b';
            return;
        }
        const blob = new Blob([val], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'login.ext';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        genFeedback.textContent = 'Downloaded login.ext';
        genFeedback.style.color = '#547540';
    });

    // Initial render
    renderUsers();
    addFeedback.textContent = 'No default admin. Add your own users.';
    updateScript();
})();
</script>
</body>
</html>
